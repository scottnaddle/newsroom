<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 에이전트 모니터링</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #1a1a2e;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    
    header p {
      color: #6b7280;
      font-size: 14px;
    }
    
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .agent-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-left: 4px solid #3b82f6;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .agent-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 12px rgba(0,0,0,0.15);
    }
    
    .agent-card.cartoon { border-left-color: #f59e0b; }
    .agent-card.colloquy { border-left-color: #8b5cf6; }
    .agent-card.insight { border-left-color: #10b981; }
    
    .agent-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    
    .agent-name {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    
    .agent-status {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    
    .agent-count {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: #f9fafb;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .agent-count-label {
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
    }
    
    .agent-count-value {
      font-size: 24px;
      font-weight: 800;
      color: #3b82f6;
    }
    
    .agent-card.cartoon .agent-count-value { color: #f59e0b; }
    .agent-card.colloquy .agent-count-value { color: #8b5cf6; }
    .agent-card.insight .agent-count-value { color: #10b981; }
    
    .agent-period {
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
      padding: 8px;
      background: #f3f4f6;
      border-radius: 4px;
    }
    
    .summary {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .summary h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #1a1a2e;
    }
    
    .summary-stat {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
    }
    
    .summary-stat:last-child {
      border-bottom: none;
    }
    
    .summary-label {
      color: #6b7280;
      font-weight: 600;
    }
    
    .summary-value {
      font-weight: 700;
      color: #1a1a2e;
    }
    
    footer {
      text-align: center;
      color: white;
      font-size: 12px;
      margin-top: 40px;
    }
    
    #lastUpdate {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 에이전트 모니터링</h1>
      <p>일일 자동화 에이전트들의 활동 현황</p>
    </header>
    
    <div class="agents-grid" id="agentsGrid">
      <!-- JavaScript로 동적 생성 -->
    </div>
    
    <div class="summary">
      <h2>📈 통계</h2>
      <div id="summaryStats">
        <!-- JavaScript로 동적 생성 -->
      </div>
      <div id="lastUpdate"></div>
    </div>
    
    <footer>
      <p>🔄 1분마다 자동 갱신</p>
    </footer>
  </div>
  
  <script>
    const AGENT_INFO = {
      cartoon: {
        icon: '🎨',
        name: '일일 만평',
        description: 'AI 교육 뉴스 일일 만평 생성'
      },
      colloquy: {
        icon: '💬',
        name: 'Colloquy',
        description: '일일 에듀테크 대담/논설'
      },
      insight: {
        icon: '📊',
        name: 'EdTech 인사이트',
        description: '교육 분야 AI 인사이트 분석'
      }
    };
    
    async function loadData() {
      try {
        const res = await fetch('/api/status');
        const status = await res.json();
        const agents = status.agents || {};
        
        // 에이전트 카드 렌더링
        let html = '';
        Object.entries(agents).forEach(([key, agent]) => {
          const info = AGENT_INFO[key];
          html += `
            <div class="agent-card ${key}">
              <div class="agent-icon">${info.icon}</div>
              <div class="agent-name">${info.name}</div>
              <div class="agent-status">${info.description}</div>
              <div class="agent-count">
                <div class="agent-count-label">최근 활동</div>
                <div class="agent-count-value">${agent.count}</div>
              </div>
              <div class="agent-period">최근 7일</div>
            </div>
          `;
        });
        
        document.getElementById('agentsGrid').innerHTML = html;
        
        // 통계 렌더링
        const totalAgentCount = Object.values(agents).reduce((sum, a) => sum + a.count, 0);
        const totalPublished = status.totalPublished;
        
        let statsHtml = `
          <div class="summary-stat">
            <span class="summary-label">🎨 만평 (7일)</span>
            <span class="summary-value">${agents.cartoon?.count || 0}개</span>
          </div>
          <div class="summary-stat">
            <span class="summary-label">💬 Colloquy (7일)</span>
            <span class="summary-value">${agents.colloquy?.count || 0}개</span>
          </div>
          <div class="summary-stat">
            <span class="summary-label">📊 인사이트 (7일)</span>
            <span class="summary-value">${agents.insight?.count || 0}개</span>
          </div>
          <div class="summary-stat" style="border-top: 2px solid #e5e7eb; margin-top: 8px; padding-top: 12px;">
            <span class="summary-label" style="font-weight: 700;">에이전트 총 발행</span>
            <span class="summary-value">${totalAgentCount}개</span>
          </div>
          <div class="summary-stat">
            <span class="summary-label">전체 시스템 발행</span>
            <span class="summary-value">${totalPublished}개</span>
          </div>
        `;
        
        document.getElementById('summaryStats').innerHTML = statsHtml;
        
        // 타임스탐프
        const date = new Date(status.timestamp);
        const formatted = date.toLocaleString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
        document.getElementById('lastUpdate').textContent = `마지막 업데이트: ${formatted}`;
      } catch (e) {
        console.error('데이터 로드 오류:', e);
      }
    }
    
    loadData();
    setInterval(loadData, 60 * 1000);
  </script>
</body>
</html>
