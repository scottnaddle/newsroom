<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📈 분석</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      color: #1a1a2e;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    
    .subtitle {
      font-size: 14px;
      color: #6b7280;
    }
    
    /* Charts Grid */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .chart-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      position: relative;
      min-height: 400px;
    }
    
    .chart-card h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #374151;
    }
    
    .chart-container {
      position: relative;
      height: 350px;
      width: 100%;
    }
    
    /* Stats Cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .stat-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 12px;
    }
    
    .stat-card .value {
      font-size: 28px;
      font-weight: 800;
      color: #8b5cf6;
      margin-bottom: 4px;
    }
    
    .stat-card .subtext {
      font-size: 12px;
      color: #9ca3af;
    }
    
    footer {
      text-align: center;
      color: white;
      font-size: 12px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📈 분석</h1>
      <p class="subtitle">시간대별 발행 현황 및 성과 지표</p>
    </header>
    
    <!-- Stats -->
    <div class="stats" id="statsContainer">
      <!-- JavaScript로 동적 생성 -->
    </div>
    
    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card">
        <h2>📊 24시간 발행 추이 (막대그래프)</h2>
        <div class="chart-container">
          <canvas id="publishChart"></canvas>
        </div>
      </div>
    </div>
  </div>
  
  <footer>
    <p>🔄 1분마다 자동 갱신 | 분석 데이터는 1주일 보관</p>
  </footer>
  
  <script>
    let chartInstance = null;
    
    async function loadData() {
      try {
        // Status 조회
        const statusRes = await fetch('/api/status');
        const status = await statusRes.json();
        
        // Analytics 조회
        const analyticsRes = await fetch('/api/analytics?hours=24');
        const analytics = await analyticsRes.json();
        
        updateStats(status);
        updateChart(analytics);
      } catch (e) {
        console.error('데이터 로드 오류:', e);
      }
    }
    
    function updateStats(status) {
      const education = status.branches.education;
      const digest = status.branches.digest;
      const totalPublished = status.totalPublished;
      const totalRejected = status.rejected;
      
      const passRate = totalPublished + totalRejected > 0
        ? Math.round(totalPublished / (totalPublished + totalRejected) * 100)
        : 0;
      
      const educationDaily = Math.ceil(education['08-published'] / 7);
      const digestDaily = Math.ceil(digest['digest/03-published'] / 7);
      
      let html = `
        <div class="stat-card">
          <h3>📚 AI 교육 (일평균)</h3>
          <div class="value">${educationDaily}</div>
          <p class="subtext">개/일</p>
        </div>
        <div class="stat-card">
          <h3>⚡ AI Digest (일평균)</h3>
          <div class="value">${digestDaily}</div>
          <p class="subtext">개/일</p>
        </div>
        <div class="stat-card">
          <h3>✅ 통과율</h3>
          <div class="value">${passRate}%</div>
          <p class="subtext">${totalPublished}/${totalPublished + totalRejected}</p>
        </div>
        <div class="stat-card">
          <h3>📊 누적 발행</h3>
          <div class="value">${totalPublished}</div>
          <p class="subtext">거부: ${totalRejected}</p>
        </div>
      `;
      
      document.getElementById('statsContainer').innerHTML = html;
    }
    
    function updateChart(analytics) {
      const ctx = document.getElementById('publishChart').getContext('2d');
      
      if (chartInstance) {
        chartInstance.destroy();
      }
      
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: analytics.labels || [],
          datasets: [
            {
              label: 'AI 교육',
              data: analytics.datasets?.[0]?.data || [],
              backgroundColor: '#3b82f6',
              borderColor: '#1e40af',
              borderWidth: 1,
              borderRadius: 4
            },
            {
              label: 'AI Digest',
              data: analytics.datasets?.[1]?.data || [],
              backgroundColor: '#f97316',
              borderColor: '#c2410c',
              borderWidth: 1,
              borderRadius: 4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
              labels: {
                font: { size: 12, family: "'Noto Sans KR', system-ui, sans-serif" },
                usePointStyle: true,
                padding: 20,
                boxWidth: 12,
                boxHeight: 12
              }
            },
            title: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                font: { size: 11, family: "'Noto Sans KR', system-ui, sans-serif" }
              },
              grid: {
                color: '#f3f4f6'
              }
            },
            x: {
              ticks: {
                font: { size: 11, family: "'Noto Sans KR', system-ui, sans-serif" }
              },
              grid: {
                display: false
              }
            }
          }
        }
      });
    }
    
    loadData();
    setInterval(loadData, 60 * 1000);
  </script>
</body>
</html>
