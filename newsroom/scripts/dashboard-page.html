<div id="newsroom-dashboard" style="font-family:'Noto Sans KR',system-ui,sans-serif;max-width:800px;margin:0 auto;color:#1a1a2e;">

<style>
  #newsroom-dashboard * { box-sizing:border-box; }
  .nr-live { display:inline-flex;align-items:center;gap:6px;background:#fee2e2;color:#dc2626;font-size:12px;font-weight:700;padding:4px 10px;border-radius:12px; }
  .nr-live::before { content:'';width:8px;height:8px;background:#dc2626;border-radius:50%;animation:nr-pulse 1.5s infinite; }
  @keyframes nr-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  
  .nr-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #1a1a2e; }
  .nr-header h2 { margin:0;font-size:22px;font-weight:800;letter-spacing:-0.5px; }
  
  .nr-pipeline { display:flex;gap:4px;margin:24px 0;flex-wrap:wrap;justify-content:center; }
  .nr-stage { flex:1;min-width:80px;text-align:center;padding:12px 6px;border-radius:8px;background:#f8fafc;border:1px solid #e2e8f0;position:relative;transition:all 0.3s; }
  .nr-stage.warning { background:#fef3c7;border-color:#f59e0b; }
  .nr-stage .nr-count { font-size:28px;font-weight:800;color:#1a1a2e;line-height:1; }
  .nr-stage .nr-label { font-size:11px;color:#64748b;margin-top:4px; }
  .nr-stage .nr-icon { font-size:18px; }
  .nr-arrow { display:flex;align-items:center;color:#cbd5e1;font-size:18px;padding:0 2px; }
  
  .nr-grid { display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0; }
  @media(max-width:600px){ .nr-grid{grid-template-columns:1fr;} .nr-pipeline{gap:2px;} .nr-stage{min-width:60px;padding:8px 4px;} .nr-stage .nr-count{font-size:22px;} }
  
  .nr-card { background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px; }
  .nr-card h3 { margin:0 0 12px;font-size:14px;font-weight:700;color:#475569; }
  
  .nr-stat-row { display:flex;justify-content:space-around;text-align:center;margin:20px 0; }
  .nr-stat { }
  .nr-stat .nr-val { font-size:32px;font-weight:800;color:#1a1a2e; }
  .nr-stat .nr-desc { font-size:12px;color:#94a3b8;margin-top:2px; }
  
  .nr-item { padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px;color:#334155; }
  .nr-item:last-child { border-bottom:none; }
  .nr-item .nr-time { font-size:11px;color:#94a3b8; }
  
  .nr-badge { display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-right:6px; }
  .nr-badge.ok { background:#dcfce7;color:#16a34a; }
  .nr-badge.warn { background:#fef3c7;color:#d97706; }
  .nr-badge.done { background:#dbeafe;color:#2563eb; }
  
  .nr-agents { margin:24px 0; }
  .nr-agent-row { display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:13px; }
  .nr-dot { width:10px;height:10px;border-radius:50%; }
  .nr-dot.green { background:#22c55e; }
  .nr-dot.yellow { background:#eab308; }
  .nr-dot.red { background:#ef4444; }
  
  .nr-footer { text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:12px;color:#94a3b8; }
  .nr-error { text-align:center;padding:40px;color:#ef4444;font-size:14px; }
</style>

<div class="nr-header">
  <h2>🏢 UBION AI 뉴스룸 관제센터</h2>
  <span class="nr-live">LIVE</span>
</div>

<div id="nr-content"><div class="nr-error">데이터 로딩 중...</div></div>

<div class="nr-footer">
  <span id="nr-update">마지막 갱신: --</span> · 30초마다 자동 갱신
</div>

<script>
const API='https://insight.ubion.global/content/newsroom/status.json';
function esc(s){return String(s||'').replace(/</g,'&lt;');}
function ago(t){if(!t)return'';const d=Math.floor((Date.now()-new Date(t))/60000);if(d<1)return'방금';if(d<60)return d+'분 전';if(d<1440)return Math.floor(d/60)+'시간 전';return Math.floor(d/1440)+'일 전';}

async function render(){
  try{
    const r=await fetch(API);
    const d=await r.json();
    const c=document.getElementById('nr-content');
    
    // 파이프라인 흐름도
    let pipe='<div class="nr-pipeline">';
    d.pipeline.forEach((s,i)=>{
      if(i>0) pipe+='<div class="nr-arrow">→</div>';
      pipe+=`<div class="nr-stage ${s.status==='warning'?'warning':''}">
        <div class="nr-icon">${s.icon}</div>
        <div class="nr-count">${s.count}</div>
        <div class="nr-label">${esc(s.name)}</div>
      </div>`;
    });
    pipe+='</div>';
    
    // 통계
    let stats=`<div class="nr-stat-row">
      <div class="nr-stat"><div class="nr-val">${d.stats.total.published}</div><div class="nr-desc">📰 교육 발행</div></div>
      <div class="nr-stat"><div class="nr-val">${d.stats.total.digest}</div><div class="nr-desc">⚡ 다이제스트</div></div>
      <div class="nr-stat"><div class="nr-val">${d.stats.passRate}%</div><div class="nr-desc">✅ 합격률</div></div>
      <div class="nr-stat"><div class="nr-val">${d.stats.today.published}</div><div class="nr-desc">📅 오늘 발행</div></div>
    </div>`;
    
    // 특수 에이전트 상태
    let special=`<div class="nr-grid">
      <div class="nr-card">
        <h3>🎨 오늘의 만평</h3>
        ${d.cartoon.today?`<span class="nr-badge done">발행 완료</span> ${esc(d.cartoon.data?.caption||d.cartoon.data?.title||'')}`:'<span class="nr-badge warn">대기 중</span> KST 12:00 발행 예정'}
      </div>
      <div class="nr-card">
        <h3>✏️ 에듀테크 인사이트</h3>
        ${d.insight.today?`<span class="nr-badge done">발행 완료</span>`:'<span class="nr-badge warn">대기 중</span> KST 20:00 발행 예정'}
      </div>
    </div>`;
    
    // 다이제스트 현황
    let digestHtml=`<div class="nr-card" style="margin:16px 0;">
      <h3>⚡ AI 다이제스트 파이프라인</h3>
      <div style="display:flex;gap:16px;justify-content:center;">
        ${d.digest.map(s=>`<div style="text-align:center;"><div style="font-size:24px;font-weight:800;">${s.count}</div><div style="font-size:11px;color:#64748b;">${s.icon} ${s.name}</div></div>`).join('<div style="display:flex;align-items:center;color:#cbd5e1;">→</div>')}
      </div>
    </div>`;
    
    // 최근 발행
    let recent=`<div class="nr-grid">
      <div class="nr-card">
        <h3>📰 최근 발행</h3>
        ${d.recentPublished.map(a=>`<div class="nr-item">${esc(a.headline)}<br><span class="nr-time">${ago(a.published_at)}</span></div>`).join('')}
      </div>
      <div class="nr-card">
        <h3>🔴 최근 거부</h3>
        ${d.recentRejected.map(a=>`<div class="nr-item">${esc(a.headline)}<br><span class="nr-time">${ago(a.published_at)}</span></div>`).join('')}
      </div>
    </div>`;

    c.innerHTML=pipe+stats+special+digestHtml+recent;
    document.getElementById('nr-update').textContent='마지막 갱신: '+new Date().toLocaleTimeString('ko-KR');
  }catch(e){
    document.getElementById('nr-content').innerHTML='<div class="nr-error">⚠️ API 연결 실패<br><small>잠시 후 자동 재시도합니다</small></div>';
  }
}

render();
setInterval(render,30000);
</script>
</div>
