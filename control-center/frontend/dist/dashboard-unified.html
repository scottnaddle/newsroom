<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBION 뉴스룸 관제센터 - 통합 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans KR', -apple-system, BlinkMacSystemFont;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(90deg, rgba(0,212,255,0.1) 0%, rgba(0,212,255,0.05) 100%);
            border-radius: 12px;
            border: 2px solid rgba(0,212,255,0.3);
            box-shadow: 0 8px 32px rgba(0,212,255,0.1);
        }

        h1 {
            color: #00d4ff;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .header-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,212,255,0.2);
        }

        .header-stat {
            text-align: center;
        }

        .header-stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #00ff88;
        }

        .header-stat-label {
            font-size: 0.9em;
            color: #888;
            margin-top: 5px;
        }

        /* Tab Navigation */
        .tab-navigation {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
            font-weight: 600;
        }

        .tab-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .tab-btn.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grid Layouts */
        .grid {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }

        .grid-4 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        /* Cards */
        .card {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 2px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0,212,255,0.4);
            box-shadow: 0 8px 32px rgba(0,212,255,0.1);
        }

        .card-title {
            color: #00d4ff;
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,212,255,0.1);
        }

        .card-stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #888;
            font-size: 0.95em;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #00ff88;
        }

        .stat-value.processing {
            color: #ffa500;
        }

        .stat-value.failed {
            color: #ff4444;
        }

        /* Pipeline Grid */
        .pipeline-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .pipeline-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 2px solid;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pipeline-card.education {
            border-color: rgba(0,212,255,0.5);
        }

        .pipeline-card.digest {
            border-color: rgba(255,105,180,0.5);
        }

        .pipeline-card.content {
            border-color: rgba(255,215,0,0.5);
        }

        .pipeline-card.research {
            border-color: rgba(50,205,50,0.5);
        }

        .pipeline-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .pipeline-icon {
            font-size: 2em;
        }

        .pipeline-name {
            color: #00d4ff;
            font-weight: 700;
            font-size: 1.1em;
        }

        .pipeline-stats-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,212,255,0.1);
            font-size: 0.95em;
        }

        .pipeline-stats-row:last-child {
            border-bottom: none;
        }

        .stats-label {
            color: #888;
        }

        .stats-number {
            font-weight: 700;
            color: #00ff88;
        }

        .stats-number.warn {
            color: #ffa500;
        }

        .stats-number.error {
            color: #ff4444;
        }

        /* Agent Grid */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .agent-item {
            background: rgba(0,212,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .agent-name {
            color: #00d4ff;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .agent-status {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .agent-status.processing {
            background: rgba(255,165,0,0.2);
            color: #ffa500;
        }

        .agent-status.idle {
            background: rgba(200,200,200,0.2);
            color: #888;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 30px;
        }

        /* Summary Box */
        .summary-box {
            background: rgba(0,212,255,0.1);
            border-left: 4px solid #00d4ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-number {
            font-size: 2em;
            font-weight: 700;
            color: #00ff88;
        }

        .summary-label {
            color: #888;
            margin-top: 5px;
            font-size: 0.9em;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: #555;
            margin-top: 40px;
            border-top: 1px solid rgba(0,212,255,0.1);
            font-size: 0.9em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .header-stats {
                gap: 20px;
            }

            .tab-navigation {
                justify-content: flex-start;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 UBION 뉴스룸 관제센터</h1>
            <p class="subtitle">실시간 AI 뉴스 파이프라인 모니터링 시스템</p>
            <div class="header-stats">
                <div class="header-stat">
                    <div class="header-stat-value" id="totalPublished">0</div>
                    <div class="header-stat-label">총 발행</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="totalProcessing">0</div>
                    <div class="header-stat-label">처리 중</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="totalFailed">0</div>
                    <div class="header-stat-label">실패</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="totalAgents">18</div>
                    <div class="header-stat-label">에이전트</div>
                </div>
            </div>
        </header>

        <!-- Tab Navigation -->
        <div class="tab-navigation">
            <button class="tab-btn active" onclick="switchTab('pipelines')">📊 파이프라인</button>
            <button class="tab-btn" onclick="switchTab('agents')">🤖 에이전트</button>
            <button class="tab-btn" onclick="switchTab('analytics')">📈 통계</button>
            <button class="tab-btn" onclick="switchTab('llm')">🧠 LLM</button>
        </div>

        <!-- Tab 1: Pipelines -->
        <div id="pipelines" class="tab-content active">
            <div class="summary-box">
                <div class="summary-item">
                    <div class="summary-number" id="pipe-published">0</div>
                    <div class="summary-label">총 발행됨</div>
                </div>
                <div class="summary-item">
                    <div class="summary-number" id="pipe-processing">0</div>
                    <div class="summary-label">처리 중</div>
                </div>
                <div class="summary-item">
                    <div class="summary-number" id="pipe-failed">0</div>
                    <div class="summary-label">실패</div>
                </div>
                <div class="summary-item">
                    <div class="summary-number" id="pipe-rate">0%</div>
                    <div class="summary-label">성공률</div>
                </div>
            </div>

            <div class="pipeline-grid" id="pipelineGrid"></div>
        </div>

        <!-- Tab 2: Agents -->
        <div id="agents" class="tab-content">
            <div class="card">
                <div class="card-title">🤖 에이전트 현황</div>
                <div id="agentContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;"></div>
            </div>

            <div class="grid grid-2" style="margin-top: 30px;">
                <div class="card">
                    <div class="card-title">📋 파이프라인 에이전트</div>
                    <div id="pipelineAgents"></div>
                </div>
                <div class="card">
                    <div class="card-title">🎯 특수 에이전트</div>
                    <div id="specialAgents"></div>
                </div>
            </div>
        </div>

        <!-- Tab 3: Analytics -->
        <div id="analytics" class="tab-content">
            <div class="grid grid-2">
                <div class="card">
                    <div class="card-title">📈 파이프라인별 발행량</div>
                    <div class="chart-container">
                        <canvas id="publishChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">🎯 성공률 비교</div>
                    <div class="chart-container">
                        <canvas id="successChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-bottom: 30px;">
                <div class="card-title">📊 상세 통계</div>
                <div id="analyticsTable"></div>
            </div>
        </div>

        <!-- Tab 4: LLM -->
        <div id="llm" class="tab-content">
            <div class="card">
                <div class="card-title">🧠 LLM 에이전트 현황</div>
                <div id="llmAgents"></div>
            </div>
        </div>

        <footer>
            <p>🏢 UBION Control Center v5 • 마지막 업데이트: <span id="lastUpdate">--:--:--</span></p>
        </footer>
    </div>

    <script>
        // ==================== 데이터 ====================
        let allAgents = [];
        let pipelines = [];
        let publishChart, successChart;

        // ==================== 에이전트 데이터 ====================
        const pipelineAgents = [
            { id: 'source-collector', name: 'Source Collector', type: 'collector' },
            { id: 'reporter', name: 'Reporter', type: 'reporter' },
            { id: 'writer', name: 'Writer', type: 'writer' },
            { id: 'fact-checker', name: 'Fact Checker', type: 'fact-checker' },
            { id: 'editor-desk', name: 'Editor Desk', type: 'editor' },
            { id: 'copy-editor', name: 'Copy Editor', type: 'copy-editor' },
            { id: 'publisher', name: 'Publisher', type: 'publisher' }
        ];

        const specialAgents = [
            { id: 'cartoon-agent', name: 'Cartoon Agent', type: 'content' },
            { id: 'colloquy', name: 'Colloquy', type: 'content' },
            { id: 'analyst', name: 'Analyst', type: 'analyzer' },
            { id: 'daily-briefing', name: 'Daily Briefing', type: 'briefing' },
            { id: 'weekly-review', name: 'Weekly Review', type: 'review' },
            { id: 'paper-collector', name: 'Paper Collector', type: 'collector' },
            { id: 'paper-processor', name: 'Paper Processor', type: 'processor' },
            { id: 'system-architect', name: 'System Architect', type: 'system' },
            { id: 'digest-collector', name: 'Digest Collector', type: 'collector' },
            { id: 'digest-writer', name: 'Digest Writer', type: 'writer' },
            { id: 'digest-publisher', name: 'Digest Publisher', type: 'publisher' }
        ];

        // ==================== 파이프라인 데이터 ====================
        const initialPipelines = [
            {
                id: 'education',
                name: 'AI 교육 뉴스',
                icon: '📚',
                category: 'education',
                stats: { published: 0, processing: 0, failed: 0, stages: 8 }
            },
            {
                id: 'digest',
                name: 'AI Digest',
                icon: '⚡',
                category: 'digest',
                stats: { published: 0, processing: 0, failed: 0, stages: 3 }
            },
            {
                id: 'content',
                name: '콘텐츠',
                icon: '🎨',
                category: 'content',
                stats: { published: 0, processing: 0, failed: 0, agents: 5 }
            },
            {
                id: 'research',
                name: '논문 분석',
                icon: '📊',
                category: 'research',
                stats: { published: 0, processing: 0, failed: 0, agents: 2 }
            }
        ];

        pipelines = JSON.parse(JSON.stringify(initialPipelines));

        // ==================== 함수: 탭 전환 ====================
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });

            // Remove active class from buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // Render charts if analytics tab is opened
            if (tabName === 'analytics') {
                setTimeout(() => {
                    if (publishChart) publishChart.resize();
                    if (successChart) successChart.resize();
                }, 100);
            }
        }

        // ==================== 함수: API 데이터 로드 ====================
        async function loadData() {
            try {
                // Load pipeline stats
                for (const pipeline of pipelines) {
                    try {
                        const res = await fetch(`/api/pipeline/${pipeline.id}/stats`);
                        const data = await res.json();
                        if (data.stats) {
                            pipeline.stats = { ...pipeline.stats, ...data.stats };
                        }
                    } catch (e) {
                        console.error(`Failed to load stats for ${pipeline.id}:`, e);
                    }
                }

                // Load agents
                try {
                    const res = await fetch('/api/agents');
                    allAgents = await res.json();
                } catch (e) {
                    console.error('Failed to load agents:', e);
                }

                renderAll();
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }

        // ==================== 함수: 모든 뷰 렌더링 ====================
        function renderAll() {
            renderPipelines();
            renderAgents();
            renderAnalytics();
            renderLLM();
            updateHeader();
        }

        // ==================== 함수: 파이프라인 렌더링 ====================
        function renderPipelines() {
            const grid = document.getElementById('pipelineGrid');
            let totalPub = 0, totalProc = 0, totalFail = 0;

            const html = pipelines.map(p => {
                totalPub += p.stats.published || 0;
                totalProc += p.stats.processing || 0;
                totalFail += p.stats.failed || 0;

                return `
                    <div class="pipeline-card ${p.category}">
                        <div class="pipeline-header">
                            <div class="pipeline-icon">${p.icon}</div>
                            <div class="pipeline-name">${p.name}</div>
                        </div>
                        <div class="pipeline-stats-row">
                            <span class="stats-label">💾 발행됨</span>
                            <span class="stats-number">${p.stats.published || 0}</span>
                        </div>
                        <div class="pipeline-stats-row">
                            <span class="stats-label">⏳ 처리중</span>
                            <span class="stats-number warn">${p.stats.processing || 0}</span>
                        </div>
                        <div class="pipeline-stats-row">
                            <span class="stats-label">⚠️ 실패</span>
                            <span class="stats-number error">${p.stats.failed || 0}</span>
                        </div>
                        <div class="pipeline-stats-row">
                            <span class="stats-label">📊 단계</span>
                            <span class="stats-number">${p.stats.stages || p.stats.agents || 0}</span>
                        </div>
                        ${p.stats.successRate ? `
                            <div class="pipeline-stats-row">
                                <span class="stats-label">✅ 성공률</span>
                                <span class="stats-number">${p.stats.successRate}%</span>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            grid.innerHTML = html;

            // Update summary
            document.getElementById('pipe-published').textContent = totalPub;
            document.getElementById('pipe-processing').textContent = totalProc;
            document.getElementById('pipe-failed').textContent = totalFail;
            const rate = totalPub + totalProc + totalFail > 0 
                ? ((totalPub / (totalPub + totalProc + totalFail)) * 100).toFixed(1) 
                : 0;
            document.getElementById('pipe-rate').textContent = rate + '%';
        }

        // ==================== 함수: 에이전트 렌더링 ====================
        function renderAgents() {
            // All agents overview
            const container = document.getElementById('agentContainer');
            container.innerHTML = allAgents.map(agent => `
                <div class="agent-item">
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-status ${agent.state}">${agent.state === 'idle' ? '대기' : '활동'}</div>
                </div>
            `).join('');

            // Pipeline agents detail
            const pipelineContainer = document.getElementById('pipelineAgents');
            pipelineContainer.innerHTML = pipelineAgents.map(agent => `
                <div class="card-stat">
                    <span class="stat-label">${agent.name}</span>
                    <span class="stat-value">✓</span>
                </div>
            `).join('');

            // Special agents detail
            const specialContainer = document.getElementById('specialAgents');
            specialContainer.innerHTML = specialAgents.map(agent => `
                <div class="card-stat">
                    <span class="stat-label">${agent.name}</span>
                    <span class="stat-value">✓</span>
                </div>
            `).join('');
        }

        // ==================== 함수: 통계 렌더링 ====================
        function renderAnalytics() {
            // Chart data
            const labels = pipelines.map(p => p.name);
            const published = pipelines.map(p => p.stats.published || 0);
            const processing = pipelines.map(p => p.stats.processing || 0);
            const failed = pipelines.map(p => p.stats.failed || 0);

            // Publish chart
            const publishCtx = document.getElementById('publishChart').getContext('2d');
            if (publishChart) publishChart.destroy();
            publishChart = new Chart(publishCtx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '발행됨',
                            data: published,
                            backgroundColor: 'rgba(0, 255, 136, 0.3)',
                            borderColor: '#00ff88',
                            borderWidth: 2
                        },
                        {
                            label: '처리중',
                            data: processing,
                            backgroundColor: 'rgba(255, 165, 0, 0.3)',
                            borderColor: '#ffa500',
                            borderWidth: 2
                        },
                        {
                            label: '실패',
                            data: failed,
                            backgroundColor: 'rgba(255, 68, 68, 0.3)',
                            borderColor: '#ff4444',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#888' } }
                    },
                    scales: {
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(0,212,255,0.1)' } },
                        x: { ticks: { color: '#888' }, grid: { color: 'rgba(0,212,255,0.1)' } }
                    }
                }
            });

            // Success rate chart
            const successCtx = document.getElementById('successChart').getContext('2d');
            if (successChart) successChart.destroy();
            const rates = pipelines.map(p => {
                const total = (p.stats.published || 0) + (p.stats.processing || 0) + (p.stats.failed || 0);
                return total > 0 ? ((p.stats.published || 0) / total * 100).toFixed(1) : 0;
            });

            successChart = new Chart(successCtx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: rates,
                        backgroundColor: [
                            'rgba(0, 212, 255, 0.5)',
                            'rgba(255, 105, 180, 0.5)',
                            'rgba(255, 215, 0, 0.5)',
                            'rgba(50, 205, 50, 0.5)'
                        ],
                        borderColor: ['#00d4ff', '#ff69b4', '#ffd700', '#32cd32'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#888' } }
                    }
                }
            });

            // Table
            const table = document.getElementById('analyticsTable');
            table.innerHTML = `
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="border-bottom: 2px solid rgba(0,212,255,0.2);">
                                <th style="text-align: left; padding: 12px; color: #00d4ff;">파이프라인</th>
                                <th style="text-align: right; padding: 12px; color: #00d4ff;">발행됨</th>
                                <th style="text-align: right; padding: 12px; color: #00d4ff;">처리중</th>
                                <th style="text-align: right; padding: 12px; color: #00d4ff;">실패</th>
                                <th style="text-align: right; padding: 12px; color: #00d4ff;">성공률</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${pipelines.map(p => {
                                const total = (p.stats.published || 0) + (p.stats.processing || 0) + (p.stats.failed || 0);
                                const rate = total > 0 ? ((p.stats.published || 0) / total * 100).toFixed(1) : 0;
                                return `
                                    <tr style="border-bottom: 1px solid rgba(0,212,255,0.1);">
                                        <td style="padding: 12px; color: #e0e0e0;">${p.icon} ${p.name}</td>
                                        <td style="text-align: right; padding: 12px; color: #00ff88;">${p.stats.published || 0}</td>
                                        <td style="text-align: right; padding: 12px; color: #ffa500;">${p.stats.processing || 0}</td>
                                        <td style="text-align: right; padding: 12px; color: #ff4444;">${p.stats.failed || 0}</td>
                                        <td style="text-align: right; padding: 12px; color: #00d4ff;">${rate}%</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // ==================== 함수: LLM 렌더링 ====================
        function renderLLM() {
            const container = document.getElementById('llmAgents');
            const llmAgentList = [
                { name: 'Claude Opus', role: '에디터', status: '활동' },
                { name: 'Claude Sonnet', role: '작성자', status: '활동' },
                { name: 'Claude Haiku', role: '검증자', status: '대기' }
            ];

            container.innerHTML = llmAgentList.map((agent, idx) => `
                <div class="card-stat">
                    <div>
                        <div style="color: #00d4ff; font-weight: 600;">${agent.name}</div>
                        <div style="color: #888; font-size: 0.9em;">${agent.role}</div>
                    </div>
                    <div class="agent-status ${agent.status === '활동' ? '' : 'idle'}">${agent.status}</div>
                </div>
            `).join('');
        }

        // ==================== 함수: 헤더 업데이트 ====================
        function updateHeader() {
            let totalPub = 0, totalProc = 0, totalFail = 0;
            pipelines.forEach(p => {
                totalPub += p.stats.published || 0;
                totalProc += p.stats.processing || 0;
                totalFail += p.stats.failed || 0;
            });

            document.getElementById('totalPublished').textContent = totalPub;
            document.getElementById('totalProcessing').textContent = totalProc;
            document.getElementById('totalFailed').textContent = totalFail;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ko-KR');
        }

        // ==================== 초기화 ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            // Auto-refresh every 30 seconds
            setInterval(loadData, 30000);
        });
    </script>
</body>
</html>
